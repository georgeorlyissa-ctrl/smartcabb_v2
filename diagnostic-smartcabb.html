<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCabb — Diagnostic Push</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #F9FAFB; padding: 24px; color: #111; }
    .header { background: #FACC15; border-radius: 12px; padding: 16px 24px; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p { font-size: 13px; opacity: .65; margin-top: 4px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    button { background: #2563EB; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1D4ED8; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 16px 0; }
    .stat { text-align: center; padding: 16px; border-radius: 10px; background: #F3F4F6; }
    .stat .num { font-size: 36px; font-weight: 700; }
    .stat .lbl { font-size: 12px; color: #6B7280; margin-top: 4px; }
    .driver { border: 2px solid #E5E7EB; border-radius: 10px; padding: 14px; margin-top: 10px; }
    .driver.ok { border-color: #86EFAC; background: #F0FDF4; }
    .driver.ko { border-color: #FCA5A5; background: #FFF1F2; }
    .driver-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .badge { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; color: white; }
    .badge.ok { background: #22C55E; }
    .badge.ko { background: #EF4444; }
    .fields { font-family: monospace; font-size: 12px; line-height: 2; }
    .ok-val { color: #16A34A; font-weight: 700; }
    .ko-val { color: #DC2626; font-weight: 700; }
    .alert { border-radius: 10px; padding: 14px; margin: 12px 0; font-weight: 600; }
    .alert-red { background: #FEE2E2; border: 2px solid #EF4444; color: #DC2626; }
    .raw { background: #F3F4F6; border-radius: 8px; padding: 12px; font-size: 11px; font-family: monospace; white-space: pre-wrap; word-break: break-all; margin-top: 12px; max-height: 400px; overflow: auto; }
    .info { font-size: 11px; color: #9CA3AF; margin-top: 20px; padding: 12px; background: #F9FAFB; border-radius: 8px; }
    #status { margin-top: 12px; color: #6B7280; font-size: 13px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🔍 SmartCabb — Diagnostic Push Notifications</h1>
  <p id="proj-info">Chargement...</p>
</div>

<div class="card">
  <h2 style="margin-bottom:16px;font-size:16px;font-weight:700;">État des chauffeurs (base KV)</h2>
  <button id="btn-analyze" onclick="fetchDebug()">🔍 Analyser les chauffeurs</button>
  <div id="status"></div>
  <div id="result"></div>
</div>

<div class="card">
  <h2 style="margin-bottom:12px;font-size:16px;font-weight:700;">Tester disponibilité par catégorie</h2>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <select id="cat-select" style="border:1px solid #D1D5DB;border-radius:8px;padding:8px 12px;font-size:14px;">
      <option value="smart_standard">Smart Standard</option>
      <option value="smart_comfort">Smart Confort</option>
      <option value="smart_plus">Smart Plus</option>
      <option value="economic">economic</option>
      <option value="comfort">comfort</option>
      <option value="van">van</option>
    </select>
    <button onclick="testAvailability()" id="btn-avail" style="background:#7C3AED;">🚗 Tester</button>
  </div>
  <div id="avail-result"></div>
</div>

<div class="info" id="token-info"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const PROJECT_ID   = "zaerjqchzqmcxqblkfkg";
  const ANON_KEY     = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZXJqcWNoenFtY3hxYmxrZmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNDMyOTgsImV4cCI6MjA3NTcxOTI5OH0.qwFRKsi9Gw4VVYoEGBBCIj0-lAZOxtqlGQ0eT6cPhik";
  const BASE_URL     = `https://${PROJECT_ID}.supabase.co/functions/v1/make-server-2eb02e52`;
  // ──────────────────────────────────────────────────────────

  document.getElementById('proj-info').textContent = `Projet : ${PROJECT_ID} · Serveur : make-server-2eb02e52`;
  document.getElementById('token-info').innerHTML  = `<b>URL :</b> ${BASE_URL}/rides/debug-drivers<br><b>Token (début) :</b> ${ANON_KEY.slice(0,45)}...`;

  async function fetchDebug() {
    const btn = document.getElementById('btn-analyze');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    btn.disabled = true;
    btn.textContent = '⏳ Chargement...';
    status.textContent = '→ Appel en cours vers Supabase...';
    result.innerHTML = '';

    try {
      const res = await fetch(`${BASE_URL}/rides/debug-drivers`, {
        headers: { Authorization: `Bearer ${ANON_KEY}` }
      });
      status.textContent = `→ Réponse HTTP ${res.status} reçue`;
      const text = await res.text();

      let data;
      try { data = JSON.parse(text); } catch { data = null; }

      if (!data) {
        result.innerHTML = `<div class="alert alert-red">❌ Réponse non-JSON (HTTP ${res.status}):</div><div class="raw">${escHtml(text)}</div>`;
        return;
      }

      if (data.error || data.code) {
        result.innerHTML = `<div class="alert alert-red">❌ Erreur serveur : <code>${escHtml(JSON.stringify(data))}</code></div>`;
        return;
      }

      renderResult(data);
    } catch (e) {
      result.innerHTML = `<div class="alert alert-red">❌ Erreur réseau : ${escHtml(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '🔄 Relancer l\'analyse';
    }
  }

  function renderResult(data) {
    const result = document.getElementById('result');
    const onlineOk  = (data.onlineCount  ?? 0) > 0;
    const eligOk    = (data.eligibleCount ?? 0) > 0;

    let html = `
      <div class="stats">
        <div class="stat">
          <div class="num" style="color:#2563EB">${data.totalDrivers ?? '?'}</div>
          <div class="lbl">Total chauffeurs</div>
        </div>
        <div class="stat">
          <div class="num" style="color:${onlineOk?'#16A34A':'#DC2626'}">${data.onlineCount ?? '?'}</div>
          <div class="lbl">En ligne</div>
        </div>
        <div class="stat">
          <div class="num" style="color:${eligOk?'#16A34A':'#DC2626'}">${data.eligibleCount ?? '?'}</div>
          <div class="lbl">Éligibles (reçoivent notifs)</div>
        </div>
      </div>`;

    if (!eligOk) {
      html += `<div class="alert alert-red">🚨 0 chauffeur éligible — aucune notification ne peut partir !</div>`;
    }

    (data.drivers || []).forEach(d => {
      const online = d.isOnline === true || d.is_online === true || d.status_online === 'online';
      const cat    = d.vehicleCategory || d.vehicle_category || d.vehicleType || d.vehicle_type || d.vehicleFromObj || '';
      html += `
        <div class="driver ${d.eligible?'ok':'ko'}">
          <div class="driver-header">
            <strong>${d.eligible?'✅':'❌'} ${escHtml(d.name||d.id)}</strong>
            <span class="badge ${d.eligible?'ok':'ko'}">${d.eligible?'ÉLIGIBLE':'NON ÉLIGIBLE'}</span>
          </div>
          <div class="fields">
            <div>🔑 Status approbation : <span class="${d.status==='approved'?'ok-val':'ko-val'}">${d.status||'MANQUANT'}</span></div>
            <div>📡 En ligne : <span class="${online?'ok-val':'ko-val'}">isOnline=${d.isOnline} | is_online=${d.is_online}</span></div>
            <div>🔔 FCM Token : <span class="${d.hasFcmToken?'ok-val':'ko-val'}">${d.hasFcmToken?'✅ '+escHtml(d.fcmTokenPreview||''):'❌ MANQUANT — notifications impossibles !'}</span></div>
            <div>🚗 Catégorie : <span class="${cat?'ok-val':'ko-val'}">${cat||'❌ MANQUANT'}</span></div>
            <div>💰 Solde : <span>${(d.balance??d.creditBalance??0).toLocaleString()} CDF</span></div>
          </div>
          ${!d.eligible ? `
          <div style="margin-top:8px;font-size:11px;background:rgba(255,255,255,.6);border-radius:6px;padding:8px;color:#DC2626;">
            <b>Cause :</b>
            ${!d.hasFcmToken        ? ' ❌ FCM Token manquant.' : ''}
            ${!online               ? ' ❌ Driver hors ligne (isOnline=false).' : ''}
            ${!(d.available||d.is_available) ? ' ❌ is_available=false.' : ''}
            ${!cat                  ? ' ❌ vehicleCategory vide.' : ''}
          </div>` : ''}
        </div>`;
    });

    // Données brutes
    html += `<details style="margin-top:16px;cursor:pointer;"><summary style="font-size:13px;color:#6B7280;">Voir JSON brut</summary><div class="raw">${escHtml(JSON.stringify(data,null,2))}</div></details>`;

    result.innerHTML = html;
    document.getElementById('status').textContent = `✅ Analyse terminée — ${data.totalDrivers} chauffeur(s) trouvé(s)`;
  }

  async function testAvailability() {
    const cat = document.getElementById('cat-select').value;
    const btn = document.getElementById('btn-avail');
    const div = document.getElementById('avail-result');
    btn.disabled = true;
    div.innerHTML = '<p style="margin-top:10px;color:#6B7280;">⏳ Appel en cours...</p>';

    try {
      const res = await fetch(`${BASE_URL}/rides/check-drivers-availability`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ vehicleCategory: cat })
      });
      const text = await res.text();
      let data; try { data = JSON.parse(text); } catch { data = null; }
      if (!data) { div.innerHTML = `<div class="alert alert-red">Réponse non-JSON : ${escHtml(text)}</div>`; return; }

      const ok = data.available === true;
      div.innerHTML = `
        <div class="alert ${ok?'':'alert-red'}" style="${ok?'background:#F0FDF4;border:2px solid #86EFAC;color:#15803D;':''}">
          ${ok
            ? `✅ ${data.driversCount} chauffeur(s) disponible pour <b>${cat}</b>`
            : `❌ Aucun chauffeur pour <b>${cat}</b> (${data.totalOnline??0} en ligne au total)`}
        </div>
        <div class="raw">${escHtml(JSON.stringify(data,null,2))}</div>`;
    } catch(e) {
      div.innerHTML = `<div class="alert alert-red">❌ Erreur réseau : ${escHtml(e.message)}</div>`;
    } finally { btn.disabled = false; }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
