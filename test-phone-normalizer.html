<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 TEST DEBUG DRIVERS API</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #00ff00;
        }
        h1 {
            color: #00ff00;
            text-align: center;
        }
        .config {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .config input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #222;
            color: #0f0;
            border: 1px solid #555;
            border-radius: 5px;
            font-family: monospace;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            border-radius: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #result {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            margin-top: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .highlight {
            background: #ff0;
            color: #000;
            padding: 2px 5px;
            font-weight: bold;
        }
        .error {
            color: #ff0000;
        }
        .success {
            color: #00ff00;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #2a2a2a;
        }
        th, td {
            border: 1px solid #555;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #333;
            color: #0f0;
        }
        tr:nth-child(even) {
            background: #252525;
        }
        .alex-row {
            background: #ff0 !important;
            color: #000 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🔍 DEBUG DRIVERS API - IDENTIFIER ALEX MBOLELA</h1>
    
    <div class="config">
        <strong>📝 CONFIGURATION SUPABASE :</strong><br>
        <input type="text" id="projectId" placeholder="Project ID (ex: abcdefghijklmnop)" value="">
        <input type="text" id="anonKey" placeholder="Anon Key (eyJhbGciOi...)" value="">
        <div style="color: #888; font-size: 12px; margin-top: 10px;">
            💡 Ces valeurs se trouvent dans /utils/supabase/info.tsx
        </div>
    </div>
    
    <div style="text-align: center;">
        <button onclick="testDriversAPI()">🧪 CHARGER /drivers</button>
        <button onclick="testDriversAPIWithTable()">📊 CHARGER /drivers (TABLEAU)</button>
        <button onclick="searchAlexMbolela()">🔍 CHERCHER "ALEX MBOLELA"</button>
    </div>

    <div id="result"></div>

    <script>
        let allDrivers = [];

        // Auto-remplir depuis localStorage si disponible
        window.addEventListener('DOMContentLoaded', () => {
            const savedProjectId = localStorage.getItem('smartcabb_project_id');
            const savedAnonKey = localStorage.getItem('smartcabb_anon_key');
            
            if (savedProjectId) document.getElementById('projectId').value = savedProjectId;
            if (savedAnonKey) document.getElementById('anonKey').value = savedAnonKey;
        });

        function getConfig() {
            const projectId = document.getElementById('projectId').value.trim();
            const anonKey = document.getElementById('anonKey').value.trim();

            if (!projectId || !anonKey) {
                alert('⚠️ Veuillez remplir le Project ID et l\'Anon Key !');
                return null;
            }

            // Sauvegarder dans localStorage
            localStorage.setItem('smartcabb_project_id', projectId);
            localStorage.setItem('smartcabb_anon_key', anonKey);

            return {
                projectId,
                anonKey,
                serverUrl: `https://${projectId}.supabase.co/functions/v1/make-server-2eb02e52`
            };
        }

        async function testDriversAPI() {
            const config = getConfig();
            if (!config) return;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="success">⏳ Chargement...</div>';

            try {
                console.log('🔄 Appel API:', `${config.serverUrl}/drivers`);
                
                const response = await fetch(`${config.serverUrl}/drivers`, {
                    headers: {
                        'Authorization': `Bearer ${config.anonKey}`
                    }
                });

                console.log('📊 Statut réponse:', response.status);

                if (!response.ok) {
                    resultDiv.innerHTML = `<div class="error">❌ Erreur HTTP ${response.status}: ${response.statusText}</div>`;
                    return;
                }

                const data = await response.json();
                console.log('📦 Data reçue:', data);

                if (data.success) {
                    allDrivers = data.drivers || [];
                    
                    let html = `<div class="success">✅ ${allDrivers.length} CONDUCTEUR(S) TROUVÉ(S)</div>\n\n`;
                    html += `Source: ${data.source || 'N/A'}\n`;
                    html += `Count: ${data.count || 0}\n\n`;
                    html += `====================================\n\n`;

                    allDrivers.forEach((driver, index) => {
                        html += `${index + 1}. ${driver.full_name || driver.name || 'NO NAME'}\n`;
                        html += `   ID: ${driver.id || 'NO ID'}\n`;
                        html += `   Phone: ${driver.phone || 'NO PHONE'}\n`;
                        html += `   Email: ${driver.email || 'NO EMAIL'}\n`;
                        html += `   Status: ${driver.status || 'N/A'}\n`;
                        html += `   isApproved: ${driver.isApproved}\n`;
                        html += `   Created: ${driver.created_at || 'N/A'}\n`;
                        html += `   Vehicle: ${driver.vehicle?.make || 'N/A'} ${driver.vehicle?.model || ''}\n`;
                        html += `\n`;
                    });

                    // Chercher Alex Mbolela
                    const alex = allDrivers.find(d => 
                        (d.full_name || '').toLowerCase().includes('alex') || 
                        (d.name || '').toLowerCase().includes('alex') ||
                        (d.phone || '').includes('811111111')
                    );

                    if (alex) {
                        html += `\n<span class="highlight">🎯 ALEX MBOLELA TROUVÉ !</span>\n`;
                        html += JSON.stringify(alex, null, 2);
                    } else {
                        html += `\n<span class="error">❌ ALEX MBOLELA PAS TROUVÉ DANS LA LISTE !</span>\n`;
                        html += `\nConducteurs disponibles:\n`;
                        allDrivers.forEach((d, i) => {
                            html += `${i+1}. ${d.full_name || d.name} (${d.phone})\n`;
                        });
                    }

                    resultDiv.innerHTML = `<pre>${html}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Erreur API: ${data.error || 'Erreur inconnue'}</div>`;
                }
            } catch (error) {
                console.error('❌ Erreur:', error);
                resultDiv.innerHTML = `<div class="error">❌ Erreur réseau: ${error.message}</div>`;
            }
        }

        async function testDriversAPIWithTable() {
            const config = getConfig();
            if (!config) return;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="success">⏳ Chargement...</div>';

            try {
                const response = await fetch(`${config.serverUrl}/drivers`, {
                    headers: {
                        'Authorization': `Bearer ${config.anonKey}`
                    }
                });

                if (!response.ok) {
                    resultDiv.innerHTML = `<div class="error">❌ Erreur HTTP ${response.status}: ${response.statusText}</div>`;
                    return;
                }

                const data = await response.json();

                if (data.success) {
                    allDrivers = data.drivers || [];
                    
                    // Créer un tableau HTML
                    let html = `<div class="success">✅ ${allDrivers.length} CONDUCTEUR(S) TROUVÉ(S)</div>`;
                    html += `<div style="color: #888;">Source: ${data.source || 'N/A'} | Count: ${data.count || 0}</div>`;
                    html += `<table>`;
                    html += `<tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Téléphone</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Approuvé</th>
                        <th>Created</th>
                        <th>Véhicule</th>
                    </tr>`;

                    allDrivers.forEach((driver, index) => {
                        const isAlex = (driver.full_name || '').toLowerCase().includes('alex') || 
                                       (driver.name || '').toLowerCase().includes('alex') ||
                                       (driver.phone || '').includes('811111111');
                        const rowClass = isAlex ? 'alex-row' : '';
                        
                        html += `<tr class="${rowClass}">`;
                        html += `<td>${index + 1}</td>`;
                        html += `<td><strong>${driver.full_name || driver.name || 'NO NAME'}</strong></td>`;
                        html += `<td>${driver.phone || 'NO PHONE'}</td>`;
                        html += `<td>${driver.email || 'NO EMAIL'}</td>`;
                        html += `<td>${driver.status || 'N/A'}</td>`;
                        html += `<td>${driver.isApproved ? '✅' : '❌'}</td>`;
                        html += `<td>${driver.created_at ? new Date(driver.created_at).toLocaleString('fr-FR') : 'N/A'}</td>`;
                        html += `<td>${driver.vehicle?.make || 'N/A'} ${driver.vehicle?.model || ''}</td>`;
                        html += `</tr>`;
                    });

                    html += `</table>`;

                    // Chercher Alex Mbolela
                    const alex = allDrivers.find(d => 
                        (d.full_name || '').toLowerCase().includes('alex') || 
                        (d.name || '').toLowerCase().includes('alex') ||
                        (d.phone || '').includes('811111111')
                    );

                    if (alex) {
                        html += `<pre style="margin-top: 20px;"><span class="highlight">🎯 ALEX MBOLELA TROUVÉ - DONNÉES COMPLÈTES :</span>\n`;
                        html += JSON.stringify(alex, null, 2);
                        html += `</pre>`;
                    } else {
                        html += `<pre style="margin-top: 20px;"><span class="error">❌ ALEX MBOLELA PAS TROUVÉ DANS LA LISTE !</span>\n\n`;
                        html += `Conducteurs disponibles:\n`;
                        allDrivers.forEach((d, i) => {
                            html += `${i+1}. ${d.full_name || d.name} (${d.phone})\n`;
                        });
                        html += `</pre>`;
                    }

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Erreur API: ${data.error || 'Erreur inconnue'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Erreur réseau: ${error.message}</div>`;
            }
        }

        async function searchAlexMbolela() {
            if (allDrivers.length === 0) {
                alert('⚠️ Veuillez d\'abord charger les conducteurs avec le bouton "CHARGER /drivers"');
                return;
            }

            const resultDiv = document.getElementById('result');
            
            const alex = allDrivers.find(d => 
                (d.full_name || '').toLowerCase().includes('alex') || 
                (d.name || '').toLowerCase().includes('alex') ||
                (d.phone || '').includes('811111111')
            );

            if (alex) {
                resultDiv.innerHTML = `
                    <div class="success">✅ ALEX MBOLELA TROUVÉ !</div>
                    <pre>${JSON.stringify(alex, null, 2)}</pre>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="error">❌ ALEX MBOLELA PAS TROUVÉ</div>
                    <pre>Cherché dans ${allDrivers.length} conducteur(s)

Critères de recherche:
- Nom contient "alex" (insensible à la casse)
- Téléphone contient "811111111"

Conducteurs disponibles:
${allDrivers.map((d, i) => `${i+1}. ${d.full_name || d.name} (${d.phone})`).join('\n')}
                    </pre>
                `;
            }
        }
    </script>
</body>
</html>
